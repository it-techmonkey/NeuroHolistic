<svg 
  width="100" 
  height="100" 
  viewBox="0 0 100 100" 
  fill="none" 
  xmlns="http://www.w3.org/2000/svg"
  className="hover:scale-110 transition-transform duration-500"
>
  {/* Outer "Sage" Ring - Subtle and precise */}
  <circle 
    cx="50" 
    cy="50" 
    r="42" 
    stroke="#2D5A43" 
    strokeWidth="1.5" 
    strokeOpacity="0.2"
  />
  
  {/* Main "Forest Green" Perimeter */}
  <circle 
    cx="50" 
    cy="50" 
    r="42" 
    stroke="#2D5A43" 
    strokeWidth="0.5" 
  />

  {/* Inner Core - The "Point of Transformation" */}
